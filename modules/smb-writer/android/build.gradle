plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules'
version = '1.0.0'

android {
  namespace "expo.modules.smbwriter"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'com.hierynomus:smbj:0.7.0'
  implementation 'org.bouncycastle:bcprov-jdk15on:1.70'
}
